name: Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          cd server
          pyinstaller --onefile --windowed --name "PK-Pult" `
            --collect-all "keyboard" --collect-all "pyautogui" `
            --hidden-import "fastapi" --hidden-import "uvicorn" `
            --hidden-import "uvicorn.loggers" --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.protocols.websockets.auto" `
            --hidden-import "uvicorn.lifespan.on" `
            --hidden-import "pydantic" --hidden-import "starlette" `
            --hidden-import "tkinter" --hidden-import "tkinter.ttk" `
            --hidden-import "tkinter.messagebox" `
            main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PK-Pult-Server
          path: server/dist/PK-Pult.exe

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          pip install flet==0.85.3
          pip install -r requirements.txt

      - name: Patch Android manifest for cleartext HTTP
        run: |
          python3 << 'PYEOF'
          import flet.version
          from flet_cli.utils.template_cache import get_cached_template_zip
          import zipfile, tempfile, shutil, os

          ref = flet.version.flet_version
          url = f"https://github.com/flet-dev/flet/releases/download/v{ref}/flet-build-template.zip"
          cached = get_cached_template_zip(url, ref)
          print(f"Template: {cached}")

          tmp = tempfile.mkdtemp()
          with zipfile.ZipFile(cached, "r") as z:
              z.extractall(tmp)

          patched = 0
          for root, _dirs, files in os.walk(tmp):
              for f in files:
                  if "AndroidManifest" not in f:
                      continue
                  path = os.path.join(root, f)
                  with open(path, "r", encoding="utf-8") as fp:
                      content = fp.read()
                  if "usesCleartextTraffic" in content:
                      continue
                  content = content.replace(
                      "<application",
                      '<application android:usesCleartextTraffic="true"'
                  )
                  with open(path, "w", encoding="utf-8") as fp:
                      fp.write(content)
                  patched += 1
                  print(f"Patched: {path}")

          with zipfile.ZipFile(str(cached), "w", zipfile.ZIP_DEFLATED) as z:
              for root, _dirs, files in os.walk(tmp):
                  for f in files:
                      fp = os.path.join(root, f)
                      z.write(fp, os.path.relpath(fp, tmp))

          shutil.rmtree(tmp)
          print(f"Patched {patched} manifest(s), template ready")
          PYEOF

      - name: Build APK
        run: |
          cd client
          flet build apk --yes --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PK-Pult-APK
          path: client/build/apk/*.apk

  release:
    needs: [build-exe, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download EXE
        uses: actions/download-artifact@v4
        with:
          name: PK-Pult-Server
          path: release/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: PK-Pult-APK
          path: release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "ПК-Пульт v${{ github.run_number }}"
          body: |
            ## ПК-Пульт v${{ github.run_number }}

            - **PK-Pult.exe** — сервер для Windows (запускать от Администратора)
            - **PK-Pult.apk** — клиент для Android

            ### Установка
            1. Скачайте `PK-Pult.exe` и запустите на ПК (ПКМ → Запуск от имени администратора)
            2. Скачайте `PK-Pult.apk`, скиньте на телефон и откройте для установки
            3. Убедитесь, что ПК и телефон в одной Wi-Fi сети
            4. В приложении введите IP компьютера и нажмите "Подкл."
          files: |
            release/PK-Pult.exe
            release/*.apk
